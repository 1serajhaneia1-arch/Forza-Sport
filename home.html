<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forza Sport </title>
  <link rel="icon" type="image/x-icon" href="./Images/favicon.jpeg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== HOME PAGE SPECIFIC ===== */
 
    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,0,13,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,0,13,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }
 
    /* ===== HERO ===== */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      overflow: hidden;
    }
 
    /* glowing orbs */
    .hero::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse at center,
        rgba(232,0,13,0.18) 0%,
        rgba(155,0,255,0.08) 40%,
        transparent 70%);
      pointer-events: none;
    }
    
 
    .hero-content { position: relative; max-width: 800px; }
 
    .hero-tag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--cyan);
      margin-bottom: 1.2rem;
      border: 1px solid rgba(0,229,255,0.35);
      padding: 0.35rem 1rem;
      border-radius: 20px;
    }
 
    .hero-logo {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: block;
      filter: drop-shadow(0 0 40px rgba(232,0,13,0.5));
    }
 
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }
    .hero-title .red  { color: var(--red); }
    .hero-title .cyan { color: var(--cyan); }
 
    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto 2rem;
      line-height: 1.65;
    }
 
    .hero-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
 
    /* ===== CTA BANNER ===== */
    .cta-banner {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--red) 0%, #7b0008 100%);
      padding: 4rem 3rem;
      text-align: center;
      overflow: hidden;
    }
    .cta-banner::before {
      content: 'FORZA';
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18rem;
      color: rgba(255,255,255,0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
    }
    .cta-banner h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .cta-banner p { font-size: 1rem; margin-bottom: 1.8rem; opacity: 0.9; position: relative; }
    .cta-banner .btn-outline { border-color: #fff; }
 
    /* ===== ANIMATIONS ===== */
   
  </style>

<style id="forza-nav-css">
/* ── Divider between nav links and auth buttons ── */
.nav-divider-li {
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,0.15);
  margin: 0 0.6rem;
  list-style: none;
}
.nav-li-auth {
  display: flex;
  align-items: center;
  list-style: none;
}
/* SIGN IN */
.nav-btn-signin {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #bbb;
  text-decoration: none;
  padding: 0.44rem 0.9rem;
  border-radius: 3px;
  overflow: hidden;
  transition: color 0.25s;
  white-space: nowrap;
}
.nav-btn-signin::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.06);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
  border-radius: 3px;
}
.nav-btn-signin::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, #e8000d, #ff6b6b);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.nav-btn-signin:hover { color: #fff; }
.nav-btn-signin:hover::before { transform: scaleX(1); }
.nav-btn-signin:hover::after  { transform: scaleX(1); }
/* REGISTER */
.nav-btn-register {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #fff;
  text-decoration: none;
  padding: 0.44rem 1.1rem;
  background: linear-gradient(135deg, #e8000d 0%, #c0000b 100%);
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(232,0,13,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
  overflow: hidden;
  transition: box-shadow 0.25s, transform 0.2s;
  white-space: nowrap;
}
.nav-btn-register::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.22), transparent);
  transform: skewX(-20deg);
  transition: left 0.5s ease;
}
.nav-btn-register:hover {
  box-shadow: 0 0 22px rgba(232,0,13,0.65), 0 4px 16px rgba(232,0,13,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: translateY(-2px);
}
.nav-btn-register:hover::before { left: 160%; }
/* USER DROPDOWN */
.nav-user-info {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text);
  padding: 0.44rem 0.9rem;
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 3px;
  transition: border-color 0.2s;
  user-select: none;
  white-space: nowrap;
}
.nav-user-info:hover { border-color: var(--red); }
.nav-chevron { font-size: 0.65rem; transition: transform 0.25s; }
.nav-user-info.open .nav-chevron { transform: rotate(180deg); }
.nav-user-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 200px;
  background: #111;
  border: 1px solid #2a2a2a;
  border-top: 3px solid var(--red);
  border-radius: 6px;
  padding: 0.5rem 0;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  z-index: 600;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.nav-user-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
.nud-item {
  display: flex; align-items: center; gap: 0.6rem;
  width: 100%; padding: 0.65rem 1.1rem;
  color: #ccc; text-decoration: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  background: none; border: none; cursor: pointer; text-align: left;
  transition: background 0.15s, color 0.15s;
}
.nud-item:hover { background: rgba(232,0,13,0.12); color: #fff; }
.nud-signout { color: #e8000d; }
.nud-signout:hover { background: rgba(232,0,13,0.15); color: #ff3333; }
.nud-divider { height: 1px; background: #222; margin: 0.3rem 0; }
</style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar">
  <a href="home.html" class="nav-logo">
    <img src="./Images/logo.jpeg" alt="Forza Sport Logo">
    <span>Forza Sport</span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html" class="active">Home</a></li>
    <li><a href="product.html">Products</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li class="nav-divider-li"></li>
    <li id="nav-li-guest" class="nav-li-auth">
      <a href="login.html" class="nav-btn-signin">Sign In</a>
    </li>
    <li id="nav-li-register" class="nav-li-auth">
      <a href="register.html" class="nav-btn-register">Register</a>
    </li>
    <li id="nav-li-user" class="nav-li-auth" style="display:none; position:relative;">
      <div class="nav-user-info" id="nav-user-trigger">
        <span class="nav-avatar">👤</span>
        <span id="nav-username">User</span>
        <span class="nav-chevron">▾</span>
      </div>
      <div class="nav-user-dropdown" id="nav-user-dropdown">
        <a href="account.html" class="nud-item">👤 My Profile</a>
        <a href="history.html" class="nud-item">📋 Order History</a>
        <a href="cart.html"    class="nud-item">🛒 My Cart</a>
        <div class="nud-divider"></div>
        <button class="nud-item nud-signout" onclick="signOut()">🚪 Sign Out</button>
      </div>
    </li>
  </ul>
  <a href="cart.html" class="nav-cart-btn">
    🛒 Cart <span class="cart-badge">0</span>
  </a>
</nav>
 
<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-tag">⚡ New Season 2026 — Now Live</div>
    <img src="./Images/logo.jpeg" alt="Forza Sport" class="hero-logo">
    <h1 class="hero-title">
      <span class="red">GEAR</span> UP.<br>
      <span class="cyan">PLAY</span> HARD.
    </h1>
   
      <a href="product.html" class="btn-red">Shop Now</a>
     
    </div>
  </div>
</section>
 
<!-- CTA BANNER -->
<section class="cta-banner">
  <h2>Ready to Level Up?</h2>
  <p>Create your free account and get exclusive member deals every week.</p>
  <a href="register.html" class="btn-outline">Sign Up Free</a>
</section>
 

 
<script src="cart.js"></script>



<script>
(function() {
  window.updateAuthNav = updateAuthNav;
  function updateAuthNav() {
    var guestEl = document.getElementById('nav-li-guest');
    var regEl   = document.getElementById('nav-li-register');
    var userEl  = document.getElementById('nav-li-user');
    var nameEl  = document.getElementById('nav-username');
    if (!guestEl) return;
    var user = null;
    try { user = JSON.parse(localStorage.getItem('forza_user')); } catch(e) {}
    if (user && user.fname) {
      guestEl.style.display = 'none';
      if (regEl) regEl.style.display = 'none';
      userEl.style.display = 'flex';
      if (nameEl) nameEl.textContent = user.fname;
    } else {
      guestEl.style.display = 'flex';
      if (regEl) regEl.style.display = 'flex';
      userEl.style.display = 'none';
    }
  }
  function initUserDropdown() {
    var trigger  = document.getElementById('nav-user-trigger');
    var dropdown = document.getElementById('nav-user-dropdown');
    if (!trigger || !dropdown) return;
    trigger.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = dropdown.classList.toggle('open');
      trigger.classList.toggle('open', open);
    });
    document.addEventListener('click', function() {
      dropdown.classList.remove('open');
      if (trigger) trigger.classList.remove('open');
    });
    dropdown.addEventListener('click', function(e) { e.stopPropagation(); });
  }
  window.signOut = function() {
    fetch('/api/logout', { method: 'POST', credentials: 'include' }).catch(function(){});
    localStorage.removeItem('forza_user');
    updateAuthNav();
    var dd = document.getElementById('nav-user-dropdown');
    if (dd) dd.classList.remove('open');
    setTimeout(function() { location.href = 'home.html'; }, 300);
  };
  document.addEventListener('DOMContentLoaded', function() {
    updateAuthNav();
    initUserDropdown();
  });
})();
</script>
<script src="forza-i18n.js"></script>
</body>
</html>
